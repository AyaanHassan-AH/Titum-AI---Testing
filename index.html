<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titum AI - Testing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
<body>
    <div class="bg-glow"></div>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="category-list-container">
                <div class="category-list" id="categoryList"></div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-main">
                    <div class="logo-container">
                        <div class="logo-icon">T</div>
                        <h1>TITUM AI <span>TESTING</span></h1>
                    </div>

                    <nav class="phase-nav">
                        <button class="nav-btn active" data-phase="1">PHASE 1</button>
                        <button class="nav-btn" data-phase="2">PHASE 2</button>
                    </nav>

                    <div class="header-actions">
                        <button id="exportBtn" class="primary-btn export-btn">
                            <i data-lucide="download"></i>
                            <span>EXPORT .TXT</span>
                        </button>
                    </div>
                </div>

                <div class="instructions-card">
                    <div class="instr-header">
                        <i data-lucide="info"></i>
                        <h3>TESTING INSTRUCTIONS</h3>
                    </div>
                    <ul>
                        <li><i data-lucide="copy"></i> <span>Copy each question, paste into <strong>Titum AI</strong>, then paste the response below.</span></li>
                        <li><i data-lucide="refresh-cw"></i> <span><strong>CRITICAL:</strong> Refresh Titum AI chat before every section (every 10 questions).</span></li>
                        <li><i data-lucide="send"></i> <span>Once all 200 responses are filled, export the TXT file and send to <strong>Ayaan Hassan</strong>.</span></li>
                    </ul>
                </div>

                <div class="top-actions">
                    <div class="search-container">
                        <i data-lucide="search"></i>
                        <input type="text" id="searchInput" placeholder="Search parameters...">
                    </div>
                    <div class="stats">
                        <div class="progress-info">
                            <span id="progressText">0 / 200</span>
                        </div>
                        <div class="progress-bar">
                            <div id="progressBarFill" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-scroll" id="contentArea">
                <!-- Content injected here -->
            </div>
        </main>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification">Copied!</div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <!-- Firebase Config Template (User needs to fill this) -->
    <script>
        // Replace with your actual Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyBbbzsqf5SZUep07J5MSvklssk3yUsX0lE",
            authDomain: "titum---testing.firebaseapp.com",
            projectId: "titum---testing",
            storageBucket: "titum---testing.firebasestorage.app",
            messagingSenderId: "762988812806",
            appId: "1:762988812806:web:726be5d84916b4044dc187"
        };

        // Initialize Firebase
        if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
            firebase.initializeApp(firebaseConfig);
            const db = firebase.firestore();
            window.db = db;
        } else {
            console.warn("Firebase not configured. Running in local-only mode.");
        }
    </script>

    <script src="questions.js"></script>
    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
