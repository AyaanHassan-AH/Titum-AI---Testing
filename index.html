<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titum AI - Testing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar (Hidden on Mobile) -->
        <aside class="sidebar">
            <div class="logo-container">
                <div class="logo-icon">T</div>
                <h1>TITUM AI <span>TESTING</span></h1>
            </div>

            <nav class="phase-nav">
                <button class="nav-btn active" data-phase="1">PHASE 1</button>
                <button class="nav-btn" data-phase="2">PHASE 2</button>
            </nav>

            <div class="category-list-container">
                <div class="category-list" id="categoryList"></div>
            </div>

            <div class="sidebar-footer">
                <button id="exportBtn" class="primary-btn">
                    <i data-lucide="download"></i>
                    EXPORT .TXT
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="instructions-card">
                    <div class="instr-header">
                        <i data-lucide="zap" style="width: 32px; height: 32px;"></i>
                        <h3>Workflow Excellence</h3>
                    </div>
                    <ul>
                        <li><i data-lucide="copy"></i> <span>Copy questions, engage with <strong>Titum AI</strong>, and document every insight below.</span></li>
                        <li><i data-lucide="refresh-cw"></i> <span><strong>CRITICAL:</strong> Reset the neural session (refresh chat) every 10 cycles.</span></li>
                        <li><i data-lucide="check-circle"></i> <span>Finalize all 200 parameters, export, and transmit to <strong>Ayaan Hassan</strong>.</span></li>
                    </ul>
                </div>

                <div class="top-actions">
                    <div class="search-container">
                        <i data-lucide="search"></i>
                        <input type="text" id="searchInput" placeholder="Search parameters...">
                    </div>
                    <div class="stats">
                        <div class="progress-info">
                            <span id="progressText">0 / 200</span>
                            <span class="sync-status" id="syncStatus"><i data-lucide="cloud-off"></i> Offline</span>
                        </div>
                        <div class="progress-bar">
                            <div id="progressBarFill" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="content-scroll" id="contentArea">
                <!-- Content injected here -->
            </div>
        </main>
    </div>

    <!-- Notification -->
    <div id="notification" class="notification">Copied!</div>

    <!-- Firebase Config Template (User needs to fill this) -->
    <script>
        // Replace with your actual Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyBbbzsqf5SZUep07J5MSvklssk3yUsX0lE",
            authDomain: "titum---testing.firebaseapp.com",
            databaseURL: "https://titum---testing-default-rtdb.firebaseio.com",
            projectId: "titum---testing",
            storageBucket: "titum---testing.firebasestorage.app",
            messagingSenderId: "762988812806",
            appId: "1:762988812806:web:726be5d84916b4044dc187"
        };

        // Initialize Firebase
        if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
            firebase.initializeApp(firebaseConfig);
            const database = firebase.database();
            window.db = database;
        } else {
            console.warn("Firebase not configured. Running in local-only mode.");
        }
    </script>

    <script src="questions.js"></script>
    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
